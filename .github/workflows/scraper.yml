name: Run voter registration scraper

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      states:
        description: "Space-separated state names to scrape (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no DB writes)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: voter-registration-tracker/scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r voter-registration-tracker/scraper/requirements.txt

      - name: Run scraper
        working-directory: voter-registration-tracker/scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.states }}" ]; then
            ARGS="--states ${{ github.event.inputs.states }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS
