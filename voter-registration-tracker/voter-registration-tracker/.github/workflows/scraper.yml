name: Run voter registration scraper

on:
  schedule:
    # Every Sunday at 06:00 UTC — most states publish mid-week
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      states:
        description: "Space-separated state names to scrape (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no DB writes)"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        working-directory: scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.states }}" ]; then
            ARGS="--states ${{ github.event.inputs.states }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraper failed. Check the run log in Supabase scraper_run_log table."
          # Add Slack/email notification here if desired
